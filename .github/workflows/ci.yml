name: Django Release Gate

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} application tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      DJANGO_SECRET_KEY: "ci-only-long-secret-key-that-is-not-used-in-production"
      DJANGO_DEBUG: "False"
      INVENTORY_PUBLIC_HOST: "156.156.40.51"
      INVENTORY_PUBLIC_PORT: "3458"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Prepare and verify local Bootstrap assets
        run: python scripts/prepare_vendor_assets.py
      - name: Compile every Python file
        run: python -m compileall -q inventory nexttoppers_inventory scripts
      - name: Generate pending migration for audit
        run: python manage.py makemigrations inventory --noinput
      - name: Upload pending migration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pending-migration-${{ matrix.python-version }}
          path: inventory/migrations/0005*.py
          if-no-files-found: ignore
          retention-days: 14
      - name: Reject migration drift
        run: git diff --exit-code -- inventory/migrations
      - name: Apply migrations
        run: python manage.py migrate --noinput
      - name: Django configuration check
        run: python manage.py check
      - name: Production deployment warnings
        run: python manage.py check --deploy
      - name: Build production static files
        run: python manage.py collectstatic --clear --noinput
      - name: Run complete Django tests
        shell: bash
        run: |
          set -o pipefail
          python manage.py test -v 2 2>&1 | tee test-output-${{ matrix.python-version }}.log
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-output-${{ matrix.python-version }}
          path: test-output-${{ matrix.python-version }}.log
          retention-days: 14

  browser-smoke:
    name: Responsive browser smoke tests
    runs-on: ubuntu-latest
    needs: test
    env:
      DJANGO_SECRET_KEY: "ci-browser-only-long-secret-key"
      DJANGO_DEBUG: "True"
      INVENTORY_PUBLIC_HOST: "127.0.0.1"
      INVENTORY_PUBLIC_PORT: "8000"
      BROWSER_SMOKE_BASE_URL: "http://127.0.0.1:8000"
      BROWSER_SMOKE_EMPLOYEE_ID: "NXTTP9000"
      BROWSER_SMOKE_PASSWORD: "ReleaseTest1234"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install application and browser dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright==1.52.0
          python -m playwright install --with-deps chromium
      - name: Prepare and verify local Bootstrap assets
        run: python scripts/prepare_vendor_assets.py
      - name: Prepare clean browser-test database
        shell: bash
        run: |
          set -o pipefail
          python manage.py migrate --noinput 2>&1 | tee browser-db-setup.log
          python scripts/create_browser_test_user.py 2>&1 | tee -a browser-db-setup.log
      - name: Upload browser database setup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-database-setup-log
          path: browser-db-setup.log
          retention-days: 14
      - name: Start Django test server
        shell: bash
        run: |
          python manage.py runserver 127.0.0.1:8000 --noreload > browser-server.log 2>&1 &
          echo $! > browser-server.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health/ | grep -q NEXT_TOPPERS_INVENTORY_OK; then
              exit 0
            fi
            sleep 1
          done
          cat browser-server.log
          exit 1
      - name: Test desktop, tablet, Android and iPhone viewports
        shell: bash
        run: |
          set -o pipefail
          python scripts/browser_smoke.py 2>&1 | tee browser-smoke.log
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: responsive-browser-smoke-evidence
          path: |
            browser-server.log
            browser-smoke.log
          retention-days: 14
