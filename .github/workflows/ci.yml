name: Django CI
on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python manage.py makemigrations inventory --noinput
      - run: python manage.py migrate --noinput
      - run: python manage.py check
        env:
          DJANGO_SECRET_KEY: "ci-only-long-secret-key-that-is-not-used-in-production"
      - name: Run Django tests
        shell: bash
        run: |
          set -o pipefail
          python manage.py test -v 2 2>&1 | tee test-output-${{ matrix.python-version }}.log
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-output-${{ matrix.python-version }}
          path: test-output-${{ matrix.python-version }}.log
          retention-days: 7
